name: Release to Firefox AMO

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign and upload to AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          web-ext sign \
            --source-dir dist/firefox \
            --channel listed \
            --artifacts-dir dist

      - name: Package Chrome
        run: |
          cd dist/chrome && zip -r ../aging-tabs-chrome.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "Aging Tabs $TAG_NAME" \
            --generate-notes \
            dist/aging-tabs-chrome.zip \
            dist/*.xpi
